name: perf

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Benchmarks
        run: python -m pytest tests/perf -m perf -v
