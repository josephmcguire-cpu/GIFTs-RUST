# Phase 1: non-blocking until the repo is fully Ruff-clean; flip to required in branch protection later.
name: lint

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      # Phase 1: enforce style on tests + small modules; expand to full trees after cleanup.
      - name: Ruff check
        run: python -m ruff check conftest.py gifts/tests validation/tests demo/tests tests/pipeline tests/e2e tests/perf tools/freeze_pipeline_cases.py
      - name: Ruff format
        run: python -m ruff format --check conftest.py gifts/tests validation/tests demo/tests tests/pipeline tests/e2e tests/perf tools/freeze_pipeline_cases.py
